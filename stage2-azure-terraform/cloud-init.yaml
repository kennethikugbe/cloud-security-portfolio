#cloud-config
package_update: true
packages:
  - ufw
  - fail2ban
runcmd:
  - sed -i 's/^#*\s*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/^#*\s*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#*\s*MaxAuthTries.*/MaxAuthTries 4/' /etc/ssh/sshd_config
  - sed -i 's/^#*\s*ClientAliveInterval.*/ClientAliveInterval 300/' /etc/ssh/sshd_config
  - sed -i 's/^#*\s*ClientAliveCountMax.*/ClientAliveCountMax 3/' /etc/ssh/sshd_config
  - sed -i 's/^#*\s*X11Forwarding.*/X11Forwarding no/' /etc/ssh/sshd_config
  - printf 'Authorized use only. All activity is monitored.\n' > /etc/ssh/banner
  - sed -i 's/^#*\s*Banner.*/Banner \/etc\/ssh\/banner/' /etc/ssh/sshd_config
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ssh
  - ufw --force enable
  - systemctl restart sshd
  - systemctl enable fail2ban
  - systemctl start fail2ban
