# Stage 3, Task 2: GitHub Actions CI/CD Security Pipeline (v1.1)
# Kenneth - Cloud Security & DevSecOps Engineer
# Implements shift-left security: SAST → secrets scan → IaC scan → container scan → compliance evidence

name: Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: kenneth-security-audit
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Static Application Security Testing (SAST)
  # ISO 27001: A.8.8 (Technical vulnerability management)
  # ─────────────────────────────────────────────
  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep via Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -w /src \
            semgrep/semgrep:latest semgrep \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/cwe-top-25 \
            --sarif \
            --output=semgrep-report.sarif \
            .

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-report.sarif
          category: semgrep-sast

  # ─────────────────────────────────────────────
  # JOB 2: Secrets Scanning
  # ISO 27001: A.8.5 (Secure authentication), A.8.6 (Capacity management)
  # ─────────────────────────────────────────────
  secrets-scan:
    name: Gitleaks Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  # ─────────────────────────────────────────────
  # JOB 3: Infrastructure as Code Security Scan
  # ISO 27001: A.8.9 (Configuration management), A.8.9
  # Checkov scans Terraform, Dockerfile, and cloud configs for misconfigurations
  # ─────────────────────────────────────────────
  iac-scan:
    name: Checkov IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform & Docker configs
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: all
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov-iac

  # ─────────────────────────────────────────────
  # JOB 4: Build Hardened Container + Trivy Scan
  # ISO 27001: A.8.8 (Technical vulnerability management), A.8.9
  # ─────────────────────────────────────────────
  container-security:
    name: Build & Scan Container
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan, iac-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ./stage3-devsecops/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Generate ISO 27001 Compliance Summary
        if: always()
        run: |
          cat << EOL > compliance-summary.md
          # CI/CD Security Compliance Summary

          | Control | Tool | Evidence | Status |
          |---------|------|----------|--------|
          | A.8.8 Technical Vulnerability Management | Trivy Container Scan | trivy-results.sarif | ${{ job.status == 'success' && 'PASS' || 'FAIL' }} |
          | A.8.8 Technical Vulnerability Management | Semgrep SAST | semgrep-report.sarif | Refer to SAST job |
          | A.8.5 Secure Authentication | Gitleaks Secrets Scan | Gitleaks artifact | Refer to secrets-scan job |
          | A.8.9 Configuration Management | Checkov IaC Scan | checkov-results.sarif | Refer to IaC scan job |
          | A.8.9 Configuration Management | Dockerfile pinned base, non-root user | Dockerfile in repo | PASS |
          | A.5.35 Independent Review | GitHub Actions workflow execution | This run: ${{ github.run_id }} | PASS |

          **Run ID:** ${{ github.run_id }}
          **Commit:** ${{ github.sha }}
          EOL

      - name: Upload compliance summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-summary
          path: compliance-summary.md
